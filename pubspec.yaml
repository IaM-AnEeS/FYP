name: blindly
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # camera, flutter_tts and tflite_flutter were used for on-device
  # detection/tts but that functionality is now handled by the backend.
  # Remove the dependencies to slim the frontend.

  image: ^4.0.17

  cupertino_icons: ^1.0.8
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.0
  speech_to_text: ^7.3.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/onboarding1.jpg
    - assets/images/onboarding2.jpg
    - assets/images/onboarding3.jpg
    # Model assets removed – detection occurs on the backend.
    
# Launcher icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
